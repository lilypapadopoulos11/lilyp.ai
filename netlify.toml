[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ── API: builds list ──
[[redirects]]
  from   = "/api/builds"
  to     = "/.netlify/functions/builds"
  status = 200

# ── API: single item (must come before the list rule) ──
[[redirects]]
  from   = "/api/library/:slug"
  to     = "/.netlify/functions/library-item?slug=:slug"
  status = 200

# ── API: full list ──
[[redirects]]
  from   = "/api/library"
  to     = "/.netlify/functions/library"
  status = 200

# ── Thank you page ──
[[redirects]]
  from   = "/thanks"
  to     = "/thanks.html"
  status = 200

# ── Build detail pages ──
[[redirects]]
  from   = "/builds/relationship-tracker"
  to     = "/builds/relationship-tracker.html"
  status = 200

# Catch-all for future build pages
[[redirects]]
  from   = "/builds/:slug"
  to     = "/builds/:slug.html"
  status = 200

# ── Static library pages (explicit rules take priority over catch-all) ──
[[redirects]]
  from   = "/library/the-claude-context-template"
  to     = "/library/the-claude-context-template.html"
  status = 200

[[redirects]]
  from   = "/library/build-your-voice-guidelines"
  to     = "/library/build-your-voice-guidelines.html"
  status = 200

[[redirects]]
  from   = "/library/connect-airtable-to-claude"
  to     = "/library/connect-airtable-to-claude.html"
  status = 200

[[redirects]]
  from   = "/library/relationship-tracker-setup"
  to     = "/library/relationship-tracker-setup.html"
  status = 200

[[redirects]]
  from   = "/library/extract-and-structure-megaprompt"
  to     = "/library/extract-and-structure-megaprompt.html"
  status = 200

[[redirects]]
  from   = "/library/meeting-notes-to-airtable"
  to     = "/library/meeting-notes-to-airtable.html"
  status = 200

# ── Dynamic library item pages (catch-all fallback) ──
# Any slug not matched above falls through to item.html for Airtable-backed pages.
[[redirects]]
  from   = "/library/:slug"
  to     = "/library/item.html"
  status = 200
