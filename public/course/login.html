<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Access | Claude... Actually</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Manrope:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:#FDFCF9;--ink:#121211;--inklight:#4A4A46;--muted:rgba(18,18,17,0.42);
      --honey:#ECA824;--apricot:#F4AA96;--blush:#FCE8E3;--stone:#F0EFEA;--sand:#E5E3DC;--border:rgba(18,18,17,0.09);
      --serif:'Fraunces',Georgia,serif;--sans:'Manrope',sans-serif;--mono:'Space Mono',monospace;
      --out:cubic-bezier(0.25,0.46,0.45,0.94);--spring:cubic-bezier(0.34,1.56,0.64,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--ink) 1px,transparent 1px);background-size:28px 28px;opacity:.026;pointer-events:none;z-index:0}
    @media(max-width:768px){body::before{display:none}}

    /* NAV */
    nav{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(253,252,249,.9);padding:1.1rem 0}
    .nav-inner{max-width:1320px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:var(--serif);font-size:1.35rem;font-weight:500;text-decoration:none;color:var(--ink);letter-spacing:-.01em}
    .nav-brand em{font-style:italic;color:var(--honey)}
    .nav-link{font-family:var(--sans);font-size:.85rem;font-weight:500;color:var(--inklight);text-decoration:none;transition:color .2s;position:relative}
    .nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:var(--honey);transition:width .25s}
    .nav-link:hover{color:var(--ink)}
    .nav-link:hover::after{width:100%}

    /* LOGIN */
    .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:4rem 2rem;position:relative;z-index:1}
    .login-card{width:100%;max-width:440px}
    .eyebrow{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
    .eyebrow::before{content:'';display:block;width:24px;height:1.5px;background:var(--apricot)}
    .login-card h1{font-family:var(--serif);font-size:clamp(2.2rem,4vw,3rem);font-weight:400;letter-spacing:-.025em;line-height:1.1;margin-bottom:.75rem}
    .login-card .subtext{font-family:var(--sans);font-size:.95rem;color:var(--inklight);line-height:1.6;margin-bottom:2rem}

    .login-form{display:flex;flex-direction:column;gap:1rem}
    .login-input{width:100%;border:2px solid var(--sand);border-radius:10px;padding:14px 16px;font-family:var(--sans);font-size:1rem;color:var(--ink);background:var(--paper);outline:none;transition:border-color .2s}
    .login-input::placeholder{color:var(--muted)}
    .login-input:focus{border-color:var(--ink)}
    .login-btn{width:100%;background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:1rem;font-weight:600;padding:14px 16px;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .3s var(--spring)}
    .login-btn:hover{background:var(--honey);color:var(--ink);transform:translateY(-1px)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

    .error-msg{font-family:var(--sans);font-size:.85rem;color:#C0392B;line-height:1.5;margin-top:.5rem;display:none}
    .error-msg.show{display:block}

    /* FOOTER */
    footer{border-top:1px solid var(--border);padding:2rem;position:relative;z-index:1}
    .footer-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .footer-brand{font-family:var(--serif);font-size:1rem;font-weight:400;color:var(--ink);text-decoration:none}
    .footer-links{display:flex;gap:1.5rem}
    .footer-links a{font-family:var(--sans);font-size:.8rem;color:var(--inklight);text-decoration:none;transition:color .2s}
    .footer-links a:hover{color:var(--ink)}
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">lily<em>p</em>.ai</a>
      <a href="/course" class="nav-link">Back to course</a>
    </div>
  </nav>

  <!-- LOGIN -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="eyebrow">STUDENT ACCESS</div>
      <h1>Claude... Actually.</h1>
      <p class="subtext">Enter the email you used to purchase the course.</p>
      <form class="login-form" id="loginForm">
        <input type="email" class="login-input" id="emailInput" placeholder="your@email.com" required autocomplete="email">
        <button type="submit" class="login-btn" id="loginBtn">Access my course</button>
        <p class="error-msg" id="errorMsg"></p>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <a href="/" class="footer-brand">lilyp.ai</a>
      <div class="footer-links">
        <a href="/">Back to site</a>
        <a href="/library">lilyp.ai/library</a>
      </div>
    </div>
  </footer>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('emailInput');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');

      const email = emailInput.value.trim();
      if (!email) return;

      // Simple email format check
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = 'Please enter a valid email address.';
        errorMsg.classList.add('show');
        return;
      }

      loginBtn.textContent = 'Checking...';
      loginBtn.disabled = true;

      try {
        const res = await fetch('/.netlify/functions/course-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (res.ok) {
          localStorage.setItem('course_access', 'true');
          localStorage.setItem('course_email', email);
          window.location.href = '/course/dashboard';
        } else {
          errorMsg.textContent = "That email isn't on our list. Check your purchase confirmation or email lily@lilyp.ai";
          errorMsg.classList.add('show');
        }
      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Try again.';
        errorMsg.classList.add('show');
      }

      loginBtn.textContent = 'Access my course';
      loginBtn.disabled = false;
    });
  </script>

</body>
</html>
