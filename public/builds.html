<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Builds — lilyp.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:#FDFCF9;--ink:#121211;--inklight:#4A4A46;--muted:rgba(18,18,17,0.42);
      --honey:#ECA824;--apricot:#F4AA96;--blush:#FCE8E3;--stone:#F0EFEA;--sand:#E5E3DC;--border:rgba(18,18,17,0.09);
      --serif:'Fraunces',Georgia,serif;--sans:'Manrope',sans-serif;--mono:'Space Mono',monospace;
      --spring:cubic-bezier(0.34,1.56,0.64,1);--out:cubic-bezier(0.25,0.46,0.45,0.94);--snappy:cubic-bezier(0.21,0.83,0.26,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--ink) 1px,transparent 1px);background-size:28px 28px;opacity:.026;pointer-events:none;z-index:0}
    @media(max-width:768px){body::before{display:none}}
    .amb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .amb1{width:500px;height:420px;top:-80px;right:-100px;background:var(--blush);opacity:.45}
    .amb2{width:380px;height:300px;bottom:5%;left:-70px;background:rgba(236,168,36,.12);opacity:1}

    /* NAV */
    nav{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(253,252,249,.9);padding:1.1rem 0}
    .nav-inner{max-width:1320px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:var(--serif);font-size:1.35rem;font-weight:500;text-decoration:none;color:var(--ink);letter-spacing:-.01em}
    .nav-brand em{font-style:italic;color:var(--honey)}
    .nav-links{display:flex;align-items:center;gap:2rem}
    .nav-link{font-family:var(--sans);font-size:.85rem;font-weight:500;color:var(--inklight);text-decoration:none;transition:color .2s;position:relative}
    .nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1.5px;background:var(--honey);transition:width .25s}
    .nav-link:hover{color:var(--ink)}
    .nav-link:hover::after{width:100%}
    .nav-link.active{color:var(--ink)}.nav-link.active::after{width:100%}
    .nav-cta{background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:.85rem;font-weight:600;padding:.5rem 1.25rem;border-radius:999px;text-decoration:none;transition:background .2s}
    .nav-cta:hover{background:var(--honey);color:var(--ink)}

    /* PAGE */
    .page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:5rem 2rem 8rem}

    /* HEADER */
    .page-eyebrow{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
    .page-eyebrow::before{content:'';display:block;width:24px;height:1.5px;background:var(--apricot)}
    .page-title{font-family:var(--serif);font-size:clamp(2.6rem,5vw,3.8rem);font-weight:400;line-height:1.08;letter-spacing:-.025em;margin-bottom:1rem}
    .page-title em{font-style:italic;color:var(--apricot)}
    .page-lead{font-family:var(--serif);font-size:1.15rem;font-weight:300;font-style:italic;color:var(--inklight);line-height:1.7;max-width:580px;margin-bottom:3.5rem}

    /* LOADING / ERROR */
    .loading{text-align:center;padding:4rem 0;color:var(--muted);font-family:var(--mono);font-size:.75rem;text-transform:uppercase;letter-spacing:.1em}
    .error{text-align:center;padding:3rem;background:var(--blush);border-radius:16px;color:var(--ink);font-size:.95rem}

    /* BUILD CARD */
    .build-stack{display:flex;flex-direction:column;gap:2.5rem}

    .build-card{
      background:white;
      border:1px solid var(--border);
      border-radius:20px;
      padding:2.5rem;
      transition:transform .35s var(--out),box-shadow .35s var(--out);
    }
    .build-card:hover{
      transform:translateY(-4px);
      box-shadow:6px 6px 0 var(--honey);
    }

    .build-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .build-name{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.2rem);font-weight:400;letter-spacing:-.02em;line-height:1.15}
    .build-status{
      font-family:var(--mono);font-size:.63rem;text-transform:uppercase;letter-spacing:.12em;
      padding:.35rem .85rem;border-radius:999px;white-space:nowrap;flex-shrink:0;
      border:1px solid var(--border);color:var(--inklight);background:var(--stone);
    }
    .build-status.live{background:rgba(39,201,63,.1);border-color:rgba(39,201,63,.25);color:#1a8a2a}
    .build-status.progress{background:rgba(236,168,36,.1);border-color:rgba(236,168,36,.3);color:#9a6e0a}
    .build-status.soon{background:var(--blush);border-color:var(--apricot);color:var(--inklight)}

    .build-desc{font-size:1rem;color:var(--inklight);line-height:1.75;margin-bottom:1.75rem;max-width:680px}

    /* TECH STACK PILLS */
    .tech-row{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.75rem}
    .tech-pill{
      font-family:var(--mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;
      padding:.3rem .7rem;border-radius:6px;
      background:var(--stone);color:var(--inklight);
    }

    /* TAGS */
    .tag-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.75rem}
    .tag-chip{
      font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;
      padding:.25rem .6rem;border-radius:999px;
      background:var(--blush);color:var(--apricot);
    }

    /* STAT GRID */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.75rem}
    .stat-item{
      background:var(--stone);
      border-radius:12px;
      padding:1rem 1.25rem;
    }
    .stat-value{font-family:var(--serif);font-size:1.5rem;font-weight:400;color:var(--ink);letter-spacing:-.02em;line-height:1.2;margin-bottom:.25rem}
    .stat-label{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}

    /* CARD LINK */
    .build-link{
      display:inline-flex;align-items:center;gap:.5rem;
      font-family:var(--sans);font-size:.85rem;font-weight:600;
      color:var(--ink);text-decoration:none;
      transition:color .2s,gap .2s;
    }
    .build-link:hover{color:var(--honey);gap:.75rem}
    .build-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* REVEAL */
    .rv{opacity:0;transform:translateY(18px);transition:opacity .6s var(--out),transform .6s var(--out)}
    .rv.vis{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.08s}.d2{transition-delay:.16s}

    /* RESPONSIVE */
    @media(max-width:600px){
      .build-card{padding:1.75rem}
      .build-header{flex-direction:column;gap:.75rem}
      .stat-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="amb amb1"></div>
  <div class="amb amb2"></div>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">lilyp.<em>ai</em></a>
      <div class="nav-links">
        <a href="/library" class="nav-link">Library</a>
        <a href="/builds" class="nav-link active">Builds</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/#help" class="nav-cta">Say hi</a>
      </div>
    </div>
  </nav>

  <div class="page">

    <div class="page-eyebrow rv">Proof of work</div>
    <h1 class="page-title rv d1">Things I've <em>actually built.</em></h1>
    <p class="page-lead rv d2">Real systems, real workflows, real outputs. Not concept decks. Each one started with a problem I saw up close and a question about whether AI could actually help.</p>

    <div id="builds-container">
      <div class="loading" id="builds-loading">Loading builds...</div>
    </div>

  </div>

  <script>
    // ── Fetch builds from Airtable via Netlify function ──
    (async function loadBuilds() {
      const container = document.getElementById('builds-container');
      const loading   = document.getElementById('builds-loading');

      try {
        const res = await fetch('/api/builds');
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const builds = await res.json();

        if (!builds.length) {
          container.innerHTML = '<p class="loading">No builds to show yet.</p>';
          return;
        }

        container.innerHTML = '<div class="build-stack">' + builds.map(renderCard).join('') + '</div>';

        // Init scroll reveals
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
        }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' });
        container.querySelectorAll('.rv').forEach(el => obs.observe(el));

        // Reveal cards already in viewport
        setTimeout(() => {
          container.querySelectorAll('.rv').forEach(el => {
            if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('vis');
          });
        }, 100);

      } catch (err) {
        container.innerHTML = '<div class="error">Could not load builds. Please try again later.</div>';
        console.error('Builds fetch error:', err);
      }
    })();

    function statusClass(status) {
      const s = (status || '').toLowerCase();
      if (s.includes('live') || s.includes('operational') || s.includes('in use')) return 'live';
      if (s.includes('progress') || s.includes('demo')) return 'progress';
      if (s.includes('coming') || s.includes('soon')) return 'soon';
      return '';
    }

    function renderCard(b) {
      const stats = [];
      if (b.stat1Val && b.stat1Label) stats.push({ val: b.stat1Val, label: b.stat1Label });
      if (b.stat2Val && b.stat2Label) stats.push({ val: b.stat2Val, label: b.stat2Label });
      if (b.stat3Val && b.stat3Label) stats.push({ val: b.stat3Val, label: b.stat3Label });
      if (b.stat4Val && b.stat4Label) stats.push({ val: b.stat4Val, label: b.stat4Label });

      const techPills = (b.tech || '').split(',').map(t => t.trim()).filter(Boolean);
      const cls = statusClass(b.status);

      let html = '<div class="build-card rv">';

      // Header: name + status
      html += '<div class="build-header">';
      html += `<h2 class="build-name">${esc(b.name)}</h2>`;
      if (b.status) {
        html += `<span class="build-status ${cls}">${esc(b.status)}</span>`;
      }
      html += '</div>';

      // Description
      if (b.desc) {
        html += `<p class="build-desc">${esc(b.desc)}</p>`;
      }

      // Tech stack pills
      if (techPills.length) {
        html += '<div class="tech-row">';
        techPills.forEach(t => { html += `<span class="tech-pill">${esc(t)}</span>`; });
        html += '</div>';
      }

      // Tags
      if (b.tags && b.tags.length) {
        html += '<div class="tag-row">';
        b.tags.forEach(t => { html += `<span class="tag-chip">${esc(t)}</span>`; });
        html += '</div>';
      }

      // Stats
      if (stats.length) {
        html += '<div class="stat-grid">';
        stats.forEach(s => {
          html += `<div class="stat-item"><div class="stat-value">${esc(s.val)}</div><div class="stat-label">${esc(s.label)}</div></div>`;
        });
        html += '</div>';
      }

      // Link
      if (b.link) {
        const label = b.linkLabel || 'Read more';
        html += `<a href="${esc(b.link)}" class="build-link">${esc(label)}<svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>`;
      }

      html += '</div>';
      return html;
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Reveal header elements
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
    }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });
    document.querySelectorAll('.rv').forEach(el => obs.observe(el));
    setTimeout(() => {
      document.querySelectorAll('.rv').forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('vis');
      });
    }, 100);
  </script>
</body>
</html>
