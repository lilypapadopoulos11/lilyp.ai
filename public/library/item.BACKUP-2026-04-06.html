<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — lilyp.ai Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Manrope:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:#FDFCF9;--ink:#121211;--inklight:#4A4A46;--muted:rgba(18,18,17,0.42);
      --honey:#ECA824;--apricot:#F4AA96;--blush:#FCE8E3;--stone:#F0EFEA;--sand:#E5E3DC;--border:rgba(18,18,17,0.09);
      --serif:'Fraunces',Georgia,serif;--sans:'Manrope',sans-serif;--mono:'Space Mono',monospace;
      --out:cubic-bezier(0.25,0.46,0.45,0.94);--snappy:cubic-bezier(0.21,0.83,0.26,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(var(--ink) 1px,transparent 1px);background-size:28px 28px;opacity:.026;pointer-events:none;z-index:0}
    @media(max-width:768px){body::before{display:none}}
    .amb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .amb1{width:500px;height:400px;top:-80px;right:-80px;background:var(--blush);opacity:.45}
    .amb2{width:350px;height:280px;bottom:10%;left:-60px;background:rgba(236,168,36,.12);opacity:1}

    /* NAV */
    nav{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(253,252,249,.9);padding:1.1rem 0}
    .nav-inner{max-width:780px;margin:0 auto;padding:0 2rem;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:var(--serif);font-size:1.25rem;font-weight:500;text-decoration:none;color:var(--ink)}
    .nav-brand em{font-style:italic;color:var(--honey)}
    .nav-back{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-decoration:none;transition:color .2s}
    .nav-back:hover{color:var(--ink)}
    .nav-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* PAGE */
    .page{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:4rem 2rem 8rem}

    /* LOADING STATE */
    .loading-state{text-align:center;padding:6rem 2rem;font-family:var(--mono);font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

    /* ERROR STATE */
    .error-state{text-align:center;padding:6rem 2rem}
    .error-state p{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:var(--muted);margin-bottom:1.5rem}
    .error-state a{font-family:var(--mono);font-size:.75rem;color:var(--ink);text-decoration:underline}

    /* HEADER */
    .entry-header{margin-bottom:3rem}
    .meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:.5rem;margin-bottom:1.5rem}
    .tag{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;padding:.22rem .6rem;border-radius:5px;border:1px solid var(--border);color:var(--inklight)}
    .tag-cat{background:var(--stone);border-color:transparent}
    .tag-wf{border-color:rgba(236,168,36,.35);color:#9a6c00;background:rgba(236,168,36,.08)}
    .tag-prompt{border-color:rgba(244,170,150,.4);color:#a85040;background:rgba(244,170,150,.1)}
    .tag-ht{border-color:rgba(236,168,36,.25);color:#9a6c00;background:rgba(236,168,36,.06)}
    .tag-td,.tag-ex{border-color:var(--border);background:var(--stone)}
    .tag-new{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--apricot);background:rgba(244,170,150,.14);border:1px solid rgba(244,170,150,.3);border-radius:999px;padding:.22rem .6rem}
    .pdot{width:5px;height:5px;background:var(--apricot);border-radius:50%;animation:pr 2s ease-in-out infinite}
    @keyframes pr{0%{box-shadow:0 0 0 0 rgba(244,170,150,.7)}60%{box-shadow:0 0 0 5px rgba(244,170,150,0)}100%{box-shadow:0 0 0 0 rgba(244,170,150,0)}}
    .date-txt{font-family:var(--mono);font-size:.68rem;color:var(--muted)}

    h1.entry-title{font-family:var(--serif);font-size:clamp(2.2rem,4vw,3.2rem);font-weight:400;line-height:1.1;letter-spacing:-.025em;margin-bottom:1.2rem}
    .hook-line{font-family:var(--serif);font-style:italic;font-size:1.25rem;font-weight:300;color:var(--inklight);line-height:1.5;border-left:3px solid var(--apricot);padding-left:1.2rem;margin-bottom:2rem}

    .get-out{display:flex;align-items:flex-start;gap:.9rem;background:var(--blush);border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:0}
    .get-out svg{width:18px;height:18px;flex-shrink:0;margin-top:2px;stroke:var(--honey);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .get-out p{font-family:var(--sans);font-size:.9rem;color:var(--inklight);line-height:1.6}
    .get-out strong{color:var(--ink);font-weight:600}

    /* RESEARCH SOURCE */
    .research-source{display:flex;align-items:flex-start;gap:.75rem;background:var(--stone);border-radius:10px;padding:1rem 1.3rem;margin:1.5rem 0 0}
    .research-source svg{width:15px;height:15px;flex-shrink:0;margin-top:2px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .research-source p{font-family:var(--mono);font-size:.7rem;color:var(--muted);line-height:1.6;margin:0}
    .research-source strong{color:var(--inklight);font-weight:600}

    /* DIVIDER */
    .entry-divider{height:1px;background:var(--border);margin:2.5rem 0}

    /* BODY CONTENT */
    .entry-body{font-size:1.05rem;line-height:1.75;color:var(--inklight)}
    .entry-body h2{font-family:var(--serif);font-size:1.6rem;font-weight:400;color:var(--ink);margin:2.5rem 0 1rem;letter-spacing:-.015em}
    .entry-body p{margin-bottom:1.25rem}
    .entry-body p:last-child{margin-bottom:0}
    .entry-body ul{margin:0 0 1.25rem 0;padding-left:0;list-style:none}
    .entry-body ul li{position:relative;padding-left:1.4rem;margin-bottom:.5rem;font-size:1rem}
    .entry-body ul li::before{content:'\2192';position:absolute;left:0;color:var(--apricot);font-family:var(--sans)}
    .entry-body strong{color:var(--ink);font-weight:600}

    /* TYPE ACCENT COLORS */
    body.type-workflow .hook-line{border-left-color:var(--honey)}
    body.type-prompt .hook-line{border-left-color:var(--apricot)}
    body.type-opinion .hook-line{border-left-color:var(--honey)}
    body.type-experiment .hook-line{border-left-color:var(--sand)}

    /* PROMPT BLOCK (dark code style with copy button) */
    .prompt-block{position:relative;background:#1e1e1e;border-radius:12px;overflow:hidden;margin:2rem 0;border:1px solid rgba(255,255,255,.06)}
    .prompt-bar{display:flex;align-items:center;justify-content:space-between;background:#2a2a2a;padding:.6rem 1rem;border-bottom:1px solid rgba(255,255,255,.07)}
    .prompt-label{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4)}
    .copy-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.3rem .7rem;font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.55);cursor:pointer;transition:background .18s,color .18s,border-color .18s;user-select:none}
    .copy-btn:hover{background:rgba(255,255,255,.13);color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.2)}
    .copy-btn.copied{background:rgba(39,201,63,.12);border-color:rgba(39,201,63,.3);color:#27c93f}
    .copy-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
    .prompt-text{padding:1.5rem 1.4rem;font-family:var(--mono);font-size:.82rem;line-height:1.75;color:rgba(255,255,255,.82);white-space:pre-wrap;word-break:break-word;overflow-x:auto}

    /* USE THIS WHEN / NOT THE RIGHT FIT GRID */
    .use-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:2rem 0}
    .use-panel{border-radius:12px;padding:1.4rem}
    .use-panel.yes{background:rgba(39,201,63,.06);border:1px solid rgba(39,201,63,.2)}
    .use-panel.no{background:rgba(244,170,150,.08);border:1px solid rgba(244,170,150,.25)}
    .use-label{font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.9rem;display:flex;align-items:center;gap:.5rem}
    .use-panel.yes .use-label{color:#1a8a2a}
    .use-panel.no  .use-label{color:#a85040}
    .use-label::before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
    .use-list{list-style:none;padding:0;margin:0}
    .use-list li{font-size:.88rem;color:var(--inklight);line-height:1.5;padding:.3rem 0;border-bottom:1px solid rgba(18,18,17,.06)}
    .use-list li:last-child{border-bottom:none}

    /* TIMELINE */
    .timeline{position:relative;margin:2.5rem 0;padding-left:2.5rem}
    .timeline::before{content:'';position:absolute;left:.85rem;top:1.5rem;bottom:1.5rem;width:1.5px;background:linear-gradient(180deg,var(--apricot) 0%,var(--honey) 60%,transparent 100%)}
    .step{position:relative;margin-bottom:2.75rem}
    .step:last-child{margin-bottom:0}
    .step-num{position:absolute;left:-2.5rem;top:.15rem;width:1.7rem;height:1.7rem;border-radius:50%;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:2;transition:background .25s,transform .25s var(--spring)}
    .step:hover .step-num{background:var(--honey);color:var(--ink);transform:scale(1.12)}
    .step-title{font-family:var(--sans);font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:.5rem;transition:color .2s}
    .step:hover .step-title{color:var(--honey)}
    .step-desc{font-family:var(--sans);font-size:.93rem;color:var(--inklight);line-height:1.65;margin-bottom:.9rem}
    .step .prompt-block{margin:1rem 0}

    /* MARKDOWN TABLE */
    .md-table-wrap{overflow-x:auto;margin:2rem 0;border-radius:12px;border:1px solid var(--border)}
    .md-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .md-table th{background:var(--stone);font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--inklight);padding:.8rem 1rem;text-align:left;border-bottom:1px solid var(--border);font-weight:600}
    .md-table td{padding:.7rem 1rem;border-bottom:1px solid var(--border);color:var(--inklight)}
    .md-table tr:last-child td{border-bottom:none}

    /* CONTENT DIVIDER */
    .content-divider{height:1px;background:var(--border);margin:2.5rem 0}

    /* RELATED / WHAT TO READ NEXT */
    .related-section{margin-top:3rem;padding-top:2.5rem;border-top:1px solid var(--border)}
    .related-label{font-family:var(--mono);font-size:.67rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:1.5rem}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .rel-card{display:block;text-decoration:none;color:var(--ink);background:white;border:1px solid var(--border);border-radius:14px;padding:1.3rem 1.4rem;transition:transform .25s var(--snappy),box-shadow .25s,border-color .25s}
    .rel-card:hover{transform:translateY(-3px);box-shadow:4px 4px 0 var(--honey);border-color:var(--ink)}
    .rel-title{font-family:var(--serif);font-size:1rem;line-height:1.3;transition:color .2s}
    .rel-card:hover .rel-title{color:var(--honey)}

    /* SOFT CTA */
    .soft-cta{margin-top:3.5rem;background:var(--blush);border-radius:20px;padding:2.5rem;text-align:center;position:relative;overflow:hidden}
    .soft-cta::before{content:'';position:absolute;top:-40%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,var(--apricot) 0%,transparent 65%);opacity:.15;border-radius:50%;pointer-events:none}
    .soft-cta p.cta-eyebrow{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:.75rem}
    .soft-cta h3{font-family:var(--serif);font-size:1.7rem;font-weight:400;letter-spacing:-.02em;margin-bottom:.75rem}
    .soft-cta p.cta-sub{font-size:.95rem;color:var(--inklight);max-width:400px;margin:0 auto 1.75rem;line-height:1.65}
    .cta-btn{display:inline-flex;align-items:center;gap:.6rem;background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:.9rem;font-weight:600;padding:.85rem 2rem;border-radius:999px;text-decoration:none;transition:background .2s,box-shadow .2s;border:none;cursor:pointer}
    .cta-btn:hover{background:var(--inklight);box-shadow:0 8px 24px -8px rgba(18,18,17,.25)}
    .cta-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* REVEAL */
    .rv{opacity:0;transform:translateY(16px);transition:opacity .6s var(--out),transform .6s var(--out)}
    .rv.vis{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}

    /* MOBILE */
    @media(max-width:600px){
      .use-grid{grid-template-columns:1fr}
      .related-grid{grid-template-columns:1fr}
    }

    #entry{display:none}
  </style>
</head>
<body>
  <div class="amb amb1"></div>
  <div class="amb amb2"></div>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">lilyp.<em>ai</em></a>
      <a href="/library" class="nav-back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Library
      </a>
    </div>
  </nav>

  <div class="page">
    <div id="loading" class="loading-state">Loading...</div>
    <div id="error" class="error-state" style="display:none">
      <p>This entry could not be found.</p>
      <a href="/library">Back to Library</a>
    </div>

    <div id="entry">
      <header class="entry-header rv">
        <div class="meta-row" id="meta-row"></div>
        <h1 class="entry-title" id="entry-title"></h1>
        <p class="hook-line" id="hook-line"></p>
        <div class="get-out">
          <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <p id="get-out-text"></p>
        </div>
        <div id="research-source-container"></div>
      </header>

      <div class="entry-divider"></div>

      <div class="entry-body rv d1" id="entry-body"></div>

      <div id="related-container"></div>

      <div class="soft-cta rv d3">
        <p class="cta-eyebrow">Found this useful?</p>
        <h3>Tell me what's slowing you down.</h3>
        <p class="cta-sub">If you're copying and pasting the same thing more than twice a week, there's probably a workflow for it. I build these things -- ask me.</p>
        <a href="/#help" class="cta-btn">
          Tell me what's broken
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </div>

  <script>
    const TYPE_TAG_CLASS = {
      'Workflow': 'tag-wf',
      'Prompt':   'tag-prompt',
      'How-To':   'tag-wf',
      'Teardown': 'tag-td',
      'Experiment':'tag-ex',
      'Opinion':  'tag-ht',
    };
    const BODY_CLASS = {
      'Workflow':   'type-workflow',
      'Prompt':     'type-prompt',
      'How-To':     'type-workflow',
      'Teardown':   'type-experiment',
      'Experiment': 'type-experiment',
      'Opinion':    'type-opinion',
    };

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

    /* ── Section header detection ────────────────────────────────── */

    const SECTION_HEADERS = [
      'USE THIS WHEN','NOT THE RIGHT FIT','THE PROMPT','THE RULE THAT MATTERS MOST',
      'HOW TO ADAPT IT','WHAT TO READ NEXT','WHY THIS WORKS','WHAT YOU GET',
      'HOW TO USE IT','THE SETUP','THE WORKFLOW','THE RESULT','WHAT BROKE',
      'WHAT I LEARNED','THE TAKEAWAY','THE CONTEXT','THE PROBLEM','THE FIX',
      'HOW IT WORKS','WHEN TO USE THIS','WHY IT MATTERS','WHAT CHANGED',
      'WHAT THIS PAIRS WITH','WHAT TO SPOT-CHECK','WHAT TO SPOT CHECK',
    ];

    function isSectionHeader(line) {
      const t = line.trim();
      const clean = t.replace(/:$/, '');
      if (SECTION_HEADERS.includes(clean)) return clean;
      if (/^[A-Z][A-Z\s''\-]{3,}$/.test(clean) && clean.includes(' ')) return clean;
      if (/^Section\s+\d+/i.test(t)) return t.replace(/:?\s*$/, '');
      // Title: subtitle pattern (colon separating two short phrases)
      if (/^[A-Z][^.!?]*:\s\S/.test(clean) && clean.length < 80) {
        const words = clean.split(/\s+/);
        if (words.length <= 10) return clean;
      }
      if (clean.length < 60 && clean.length > 3 && /^[A-Z]/.test(clean) && !/[.!?]$/.test(clean) && !/(?:^|\s)[a-z]{3,}(?:\s[a-z]{3,}){4}(?:\s|$)/.test(clean)) {
        const words = clean.split(/\s+/);
        if (words.length <= 8 && !clean.includes('. ')) return clean;
      }
      return null;
    }

    function isStepHeader(line) {
      return /^Step\s+\d+/i.test(line.trim());
    }

    function isDivider(line) {
      return /^-{3,}$/.test(line.trim());
    }

    function isUseThisWhen(line) {
      const clean = line.trim().replace(/:$/, '');
      return /^USE THIS WHEN$/i.test(clean);
    }

    function isNotTheRightFit(line) {
      const clean = line.trim().replace(/:$/, '');
      return /^NOT THE RIGHT FIT$/i.test(clean);
    }

    function isListBlock(block) {
      const lines = block.split(/\n/);
      return lines.length >= 1 && lines.every(l => /^[\-\*\u00b7\u2022\u2192]\s/.test(l.trim()) || /^\d+[\.\)]\s/.test(l.trim()));
    }

    function parseListItems(block) {
      return block.split(/\n/).map(l => l.trim().replace(/^[\-\*\u00b7\u2022\u2192\d+\.\)]+\s*/, ''));
    }

    function isTableBlock(block) {
      const lines = block.split('\n').filter(l => l.trim());
      return lines.length >= 1 && lines.every(l => l.trim().startsWith('|') && l.trim().endsWith('|'));
    }

    /* ── Title-case helper for ALL-CAPS headers ──────────────────── */

    function titleCase(headerName) {
      if (/^[A-Z\s''\-]+$/.test(headerName)) {
        const display = headerName.split(' ').map(w =>
          w.length <= 2 ? w.toLowerCase() : w.charAt(0) + w.slice(1).toLowerCase()
        ).join(' ');
        return display.charAt(0).toUpperCase() + display.slice(1);
      }
      return headerName;
    }

    /* ── Render helpers ──────────────────────────────────────────── */

    function renderPromptBlock(text) {
      return '<div class="prompt-block">' +
        '<div class="prompt-bar">' +
          '<span class="prompt-label">Prompt \u00b7 Copy and adapt</span>' +
          '<button class="copy-btn" onclick="copyPromptBlock(this)">' +
            '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' +
            '<span>Copy</span>' +
          '</button>' +
        '</div>' +
        '<div class="prompt-text">' + escapeHtml(text) + '</div>' +
      '</div>';
    }

    function renderUseGrid(goodItems, badItems) {
      let html = '<div class="use-grid">';
      html += '<div class="use-panel yes"><div class="use-label">Good fit</div><ul class="use-list">';
      for (const item of goodItems) html += '<li>' + escapeHtml(item) + '</li>';
      html += '</ul></div>';
      if (badItems.length > 0) {
        html += '<div class="use-panel no"><div class="use-label">Not the right fit</div><ul class="use-list">';
        for (const item of badItems) html += '<li>' + escapeHtml(item) + '</li>';
        html += '</ul></div>';
      }
      html += '</div>';
      return html;
    }

    function renderTable(block) {
      const rows = block.split('\n').filter(l => l.trim().startsWith('|'));
      if (rows.length === 0) return '<p>' + escapeHtml(block) + '</p>';
      let html = '<div class="md-table-wrap"><table class="md-table">';
      let isFirst = true;
      for (const row of rows) {
        if (/^\|[\s\-:|\s]+\|$/.test(row.trim())) continue;
        const cells = row.split('|').slice(1, -1);
        const tag = isFirst ? 'th' : 'td';
        html += '<tr>' + cells.map(c => '<' + tag + '>' + escapeHtml(c.trim()) + '</' + tag + '>').join('') + '</tr>';
        isFirst = false;
      }
      html += '</table></div>';
      return html;
    }

    function renderReadNext(items) {
      let html = '<div class="related-section rv d2"><div class="related-label">What to read next</div><div class="related-grid">';
      for (const item of items) {
        const slug = item.toLowerCase()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '');
        html += '<a href="/library/' + slug + '" class="rel-card">' +
          '<div class="rel-title">' + escapeHtml(item) + '</div></a>';
      }
      html += '</div></div>';
      return html;
    }

    function renderList(block) {
      const items = parseListItems(block);
      return '<ul>' + items.map(item => '<li>' + escapeHtml(item) + '</li>').join('') + '</ul>';
    }

    /* ── Pre-processing: extract structured sections from raw text ─ */

    function extractResearchSource(text) {
      if (!text.trimStart().startsWith('Research source:')) return { source: null, body: text };
      const divIdx = text.indexOf('\n\n---');
      if (divIdx === -1) {
        // No divider: take the first paragraph as source
        const endIdx = text.indexOf('\n\n');
        if (endIdx === -1) return { source: text.replace(/^Research source:\s*/i, '').trim(), body: '' };
        return {
          source: text.substring(0, endIdx).replace(/^Research source:\s*/i, '').trim(),
          body: text.substring(endIdx).trim()
        };
      }
      return {
        source: text.substring(0, divIdx).replace(/^Research source:\s*/i, '').trim(),
        body: text.substring(divIdx + 5).trim()  // skip \n\n---
      };
    }

    function extractReadNext(text) {
      const marker = /\n\n(?:What to read next:?)\s*\n/i;
      const match = text.match(marker);
      if (!match) return { links: [], body: text };
      const idx = match.index;
      const afterMarker = text.substring(idx + match[0].length);
      let body = text.substring(0, idx).trim();

      const lines = afterMarker.split('\n');
      const links = [];
      for (const line of lines) {
        const trimmed = line.trim();
        if (/^[-\*\u00b7\u2022\u2192]\s/.test(trimmed)) {
          links.push(trimmed.replace(/^[-\*\u00b7\u2022\u2192]\s*/, ''));
        }
      }
      return { links, body };
    }

    function stripTrailingCta(text) {
      return text.replace(/\n*If this helped[\s\S]*$/i, '').trim();
    }

    /* ── Text normalization ──────────────────────────────────────── */

    // Known patterns that must be standalone blocks for the parser
    const STANDALONE_PATTERNS = [
      /^-{3,}$/,
      /^USE THIS WHEN:?\s*$/i,
      /^NOT THE RIGHT FIT:?\s*$/i,
      /^THE PROMPT:?\s*$/i,
      /^THE RULE THAT MATTERS MOST:?\s*$/i,
      /^HOW TO ADAPT IT:?\s*$/i,
      /^WHAT THIS PAIRS WITH:?\s*$/i,
      /^WHAT TO SPOT[- ]?CHECK:?\s*$/i,
      /^Step\s+\d+:?\s/i,
    ];

    function normalizeContent(text) {
      var lines = text.split('\n');
      var out = [];
      for (var k = 0; k < lines.length; k++) {
        var trimmed = lines[k].trim();
        var isStandalone = STANDALONE_PATTERNS.some(function(p) { return p.test(trimmed); });
        if (isStandalone) {
          out.push('', trimmed, '');
        } else {
          out.push(lines[k]);
        }
      }
      return out.join('\n');
    }

    /* ── Main content parser ─────────────────────────────────────── */

    function contentToHtml(text) {
      if (!text) return '';
      text = normalizeContent(text);
      const blocks = text.split(/\n\n+/);
      let html = '';
      let i = 0;
      let inTimeline = false;

      while (i < blocks.length) {
        const block = blocks[i].trim();
        if (!block) { i++; continue; }

        /* ── Divider-delimited prompt block ─────────────────────── */
        if (isDivider(block)) {
          // Look ahead: is there content followed by another ---?
          let promptContent = [];
          let j = i + 1;
          let foundClosing = false;
          while (j < blocks.length) {
            if (isDivider(blocks[j].trim())) { foundClosing = true; break; }
            promptContent.push(blocks[j].trim());
            j++;
          }
          if (foundClosing && promptContent.length > 0) {
            // Close any open timeline step's description first
            if (inTimeline) {
              // Prompt block belongs inside the current step
              html += renderPromptBlock(promptContent.join('\n\n'));
            } else {
              html += renderPromptBlock(promptContent.join('\n\n'));
            }
            i = j + 1; // skip past closing ---
            continue;
          }
          // No matching closing --- : treat as a plain divider
          html += '<div class="content-divider"></div>';
          i++;
          continue;
        }

        /* ── USE THIS WHEN / NOT THE RIGHT FIT grid ─────────────── */
        if (isUseThisWhen(block)) {
          if (inTimeline) { html += '</div>'; inTimeline = false; }
          i++;
          let goodItems = [];
          // Collect list items for "good fit"
          while (i < blocks.length && !isSectionHeader(blocks[i].trim()) && !isDivider(blocks[i].trim())) {
            const b = blocks[i].trim();
            if (isListBlock(b)) {
              goodItems = goodItems.concat(parseListItems(b));
              i++;
            } else break;
          }
          // Check for NOT THE RIGHT FIT
          let badItems = [];
          if (i < blocks.length && isNotTheRightFit(blocks[i].trim())) {
            i++;
            while (i < blocks.length && !isSectionHeader(blocks[i].trim()) && !isDivider(blocks[i].trim())) {
              const b = blocks[i].trim();
              if (isListBlock(b)) {
                badItems = badItems.concat(parseListItems(b));
                i++;
              } else break;
            }
          }
          html += renderUseGrid(goodItems, badItems);
          continue;
        }

        /* ── Step N: header -> timeline ─────────────────────────── */
        if (isStepHeader(block)) {
          if (!inTimeline) {
            html += '<div class="timeline">';
            inTimeline = true;
          }
          const stepMatch = block.match(/^Step\s+(\d+):?\s*(.*)/i);
          const stepNum = stepMatch ? stepMatch[1] : '0';
          const stepTitle = stepMatch ? stepMatch[2] : '';
          const paddedNum = stepNum.length < 2 ? '0' + stepNum : stepNum;

          html += '<div class="step"><div class="step-num">' + paddedNum + '</div>';
          html += '<div class="step-title">' + escapeHtml(stepTitle) + '</div>';

          // Collect step content until next Step header or section header
          i++;
          let stepDescParts = [];

          while (i < blocks.length) {
            const next = blocks[i].trim();
            if (!next) { i++; continue; }
            if (isStepHeader(next)) break;

            // Check for section header (but not USE THIS WHEN which has its own handler)
            const hdr = isSectionHeader(next);
            if (hdr && !isUseThisWhen(next) && !isNotTheRightFit(next) && !isDivider(next)) break;

            // Handle prompt blocks within a step
            if (isDivider(next)) {
              // Flush description so far
              if (stepDescParts.length > 0) {
                html += '<div class="step-desc">' + stepDescParts.map(p => escapeHtml(p)).join('<br><br>') + '</div>';
                stepDescParts = [];
              }
              // Find prompt content
              let promptContent = [];
              let j = i + 1;
              let foundClosing = false;
              while (j < blocks.length) {
                if (isDivider(blocks[j].trim())) { foundClosing = true; break; }
                promptContent.push(blocks[j].trim());
                j++;
              }
              if (foundClosing && promptContent.length > 0) {
                html += renderPromptBlock(promptContent.join('\n\n'));
                i = j + 1;
                continue;
              }
              // Not a prompt block pair: skip this divider
              i++;
              continue;
            }

            stepDescParts.push(next);
            i++;
          }

          // Flush remaining step description
          if (stepDescParts.length > 0) {
            html += '<div class="step-desc">' + stepDescParts.map(p => escapeHtml(p)).join('<br><br>') + '</div>';
          }

          html += '</div>'; // close .step

          // If next block is not a step, close the timeline
          if (i >= blocks.length || !isStepHeader(blocks[i].trim())) {
            html += '</div>'; // close .timeline
            inTimeline = false;
          }
          continue;
        }

        /* ── Close timeline if we drifted out ───────────────────── */
        if (inTimeline) {
          html += '</div>';
          inTimeline = false;
        }

        /* ── Table block ────────────────────────────────────────── */
        if (isTableBlock(block)) {
          html += renderTable(block);
          i++;
          continue;
        }

        /* ── Section header ─────────────────────────────────────── */
        const headerName = isSectionHeader(block);
        if (headerName) {
          html += '<h2>' + escapeHtml(titleCase(headerName)) + '</h2>';
          i++;
          continue;
        }

        /* ── List block ─────────────────────────────────────────── */
        if (isListBlock(block)) {
          html += renderList(block);
          i++;
          continue;
        }

        /* ── Regular paragraph ──────────────────────────────────── */
        html += '<p>' + escapeHtml(block).replace(/\n/g, '<br>') + '</p>';
        i++;
      }

      if (inTimeline) html += '</div>';
      return html;
    }

    /* ── Copy button handler ─────────────────────────────────────── */

    function copyPromptBlock(btn) {
      const text = btn.closest('.prompt-block').querySelector('.prompt-text').textContent;
      navigator.clipboard.writeText(text).then(function() {
        var label = btn.querySelector('span');
        var prev = label.textContent;
        btn.classList.add('copied');
        label.textContent = 'Copied';
        setTimeout(function() { btn.classList.remove('copied'); label.textContent = prev; }, 2000);
      });
    }

    /* ── "What you'll get" builder ───────────────────────────────── */

    function buildGetOut(entry) {
      var typeLabel = {
        'Workflow':    'A repeatable workflow you can run after any meeting or task.',
        'Prompt':      'A reusable prompt you can adapt to your exact use case.',
        'How-To':      'A step-by-step guide you can follow right now.',
        'Teardown':    'An honest account of how this system was built and what broke.',
        'Experiment':  'An honest experiment -- what worked, what failed, and what it taught.',
        'Opinion':     'A take grounded in real experience, not theory.',
      };
      var base = typeLabel[entry.type] || 'Practical notes from real work.';
      return '<strong>What you\'ll get out of this:</strong> ' + base;
    }

    /* ── Load and render ─────────────────────────────────────────── */

    async function loadEntry() {
      var slug = window.location.pathname.replace('/library/', '').replace(/\/$/, '');
      if (!slug) { showError(); return; }
      try {
        var res = await fetch('/api/library/' + encodeURIComponent(slug));
        if (!res.ok) { showError(); return; }
        var entry = await res.json();
        render(entry);
      } catch (err) {
        console.error(err);
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }

    function render(entry) {
      document.title = entry.title + ' \u2014 lilyp.ai Library';
      document.body.classList.add(BODY_CLASS[entry.type] || '');

      // Meta row
      var meta = document.getElementById('meta-row');
      var metaHtml = '';
      if (entry.status === 'new') metaHtml += '<span class="tag tag-new"><span class="pdot"></span>New</span>';
      metaHtml += '<span class="tag tag-cat">' + escapeHtml(entry.cat) + '</span>';
      metaHtml += '<span class="tag ' + (TYPE_TAG_CLASS[entry.type] || '') + '">' + escapeHtml(entry.type) + '</span>';
      if (entry.len) metaHtml += '<span class="tag">' + escapeHtml(entry.len) + '</span>';
      if (entry.date) metaHtml += '<span class="date-txt">' + escapeHtml(entry.date) + '</span>';
      meta.innerHTML = metaHtml;

      document.getElementById('entry-title').textContent = entry.title;
      document.getElementById('hook-line').textContent = entry.hook || '';
      document.getElementById('get-out-text').innerHTML = buildGetOut(entry);

      // Process content: extract structured sections
      var rawDesc = entry.desc || '';

      // 1. Extract research source
      var rs = extractResearchSource(rawDesc);
      rawDesc = rs.body;

      // 2. Strip leading --- divider if research source was extracted
      rawDesc = rawDesc.replace(/^-{3,}\s*\n*/, '').trim();

      // 3. Extract "What to read next" links
      var rn = extractReadNext(rawDesc);
      rawDesc = rn.body;

      // 4. Strip trailing CTA line
      rawDesc = stripTrailingCta(rawDesc);

      // Render research source
      if (rs.source) {
        document.getElementById('research-source-container').innerHTML =
          '<div class="research-source">' +
            '<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>' +
            '<p><strong>Research source:</strong> ' + escapeHtml(rs.source) + '</p>' +
          '</div>';
      }

      // If no hook was provided, use first paragraph of body as hook
      if (!entry.hook && rawDesc) {
        var firstPara = rawDesc.split(/\n\n/)[0];
        if (firstPara && firstPara.length < 300) {
          document.getElementById('hook-line').textContent = firstPara;
          rawDesc = rawDesc.substring(firstPara.length).trim();
        }
      }

      // Render body
      document.getElementById('entry-body').innerHTML = contentToHtml(rawDesc);

      // Render related links
      if (rn.links.length > 0) {
        document.getElementById('related-container').innerHTML = renderReadNext(rn.links);
      }

      // Show entry
      document.getElementById('loading').style.display = 'none';
      var entryEl = document.getElementById('entry');
      entryEl.style.display = 'block';

      // Trigger reveals
      var obs = new IntersectionObserver(function(es) {
        es.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
      }, { threshold: 0.08, rootMargin: '0px 0px -20px 0px' });
      document.querySelectorAll('.rv').forEach(function(el) { obs.observe(el); });

      setTimeout(function() {
        document.querySelectorAll('.rv').forEach(function(el) {
          if (el.getBoundingClientRect().top < window.innerHeight) el.classList.add('vis');
        });
      }, 50);
    }

    loadEntry();
  </script>
</body>
</html>
